<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover - Capítulo 15</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif
        }
        div > p{
            display: none;
        }
        div:hover  > p{
            display: block;
            color:#8a2be2;
            background-color: #80bf80;
            width: 250px;
        }
        div:hover{
            color: #9f56cf
        }
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre o texto.</p>
    <div>
        Passe o mouse aqui
        <p>Texto Escondido . . .</p>
    </div>
    <p>Fim do exemplo.</p>
</body>
</html>
