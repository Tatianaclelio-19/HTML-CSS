<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div{
            background-color: lightgrey;
            height: 200px;
            width: 200px;
            border: 1px solid black;
            text-align: center;
            display: inline-block;
        }
    /* : são usados para pseudo-classes */
    /* hover é usado para alterar o estado(no caso a cor) enquanto o mouse é passado por cima da área, no caso a div)*/
    div:hover{
        background-color: rgb(176, 233, 176);
    }
    </style>
</head>
<body>
   <div id="d1">01</div>
   <div id="d2">02</div>
   <div id="d3">03</div>
    
</body>
</html>
