<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
<style>
    @font-face{
        font-family: 'heart';
        src: url('font/Sephora & Hayden.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
    /* Tipos de fomat()
        - opentype (otf)
        - truetype (ttf)
        - embedded-opentype
        - truetype-aat(Apple Advanced Typography)
        - svg
    */
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    h1{
        font-family: 'heart', Times, serif;
        font-size: 3em;
        font-weight: normal;
    }
</style>

</head>
<body>
    <h1>Título & Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nam unde voluptatibus ullam eius error reprehenderit dolore at molestiae facere! Non perspiciatis excepturi harum dolor beatae enim neque eligendi fuga perferendis?
    </p>
</body>
</html>
